<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵感炼丹炉 · AI Agent 卡牌</title>
<style>
  :root {
    --bg-page: #fafafa;
    --bg-card: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #666666;
    --text-muted: #999999;
    
    --neon-pink: #e83d8f;
    --neon-blue: #0ea5e9;
    --neon-green: #10b981;
    
    --gradient-pink: linear-gradient(135deg, #e83d8f 0%, #7c3aed 100%);
    
    --border-subtle: rgba(0, 0, 0, 0.12);
    --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.06);
    --shadow-btn: 0 4px 20px rgba(232, 61, 143, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232, 61, 143, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(14, 165, 233, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .signal-rings {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .signal-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid;
    opacity: 0;
    animation: signal-pulse 6s ease-out infinite;
  }

  .signal-ring:nth-child(1) { width: 400px; height: 400px; border-color: rgba(232, 61, 143, 0.15); animation-delay: 0s; }
  .signal-ring:nth-child(2) { width: 600px; height: 600px; border-color: rgba(14, 165, 233, 0.1); animation-delay: 2s; }
  .signal-ring:nth-child(3) { width: 800px; height: 800px; border-color: rgba(124, 58, 237, 0.06); animation-delay: 4s; }

  @keyframes signal-pulse {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
  }

  .container {
    max-width: 680px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .header-pill {
    display: inline-block;
    background: rgba(232, 61, 143, 0.08);
    border: 1px solid rgba(232, 61, 143, 0.2);
    color: var(--neon-pink);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 32px;
    letter-spacing: 1px;
    text-align: left;
  }

  /* 引导语区域 */
  .prompt-area {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    padding: 32px 36px;
    box-shadow: var(--shadow-card);
    margin-bottom: 24px;
  }

  /* 每行 */
  .prompt-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
    transition: all 0.3s ease;
  }

  .prompt-line:last-of-type {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .prompt-line.active.dim, 
  .prompt-line.active.abi, 
  .prompt-line.active.per {
    margin: -8px -12px;
    padding: 8px 12px 16px;
    border-radius: 12px;
    border-bottom: none;
  }

  .prompt-prefix {
    font-size: 18px;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .prompt-main {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .prompt-main.dim { color: var(--neon-pink); }
  .prompt-main.abi { color: var(--neon-blue); }
  .prompt-main.per { color: var(--neon-green); }

  .prompt-suffix {
    font-size: 18px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* 桌面端：正常的flex布局 */
  .prompt-line {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-subtle);
    transition: all 0.3s ease;
  }

  .prompt-line:last-of-type {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }

  .prompt-line.active.dim, 
  .prompt-line.active.abi, 
  .prompt-line.active.per {
    margin: -8px -12px;
    padding: 8px 12px 16px;
    border-radius: 12px;
    border-bottom: none;
  }

  /* 重抽按钮 */
  .btn-redraw {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border-subtle);
    background: var(--bg-card);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-size: 14px;
    opacity: 0.5;
    margin-left: auto;
  }

  .btn-redraw:hover {
    opacity: 1;
    transform: rotate(180deg);
  }

  .btn-redraw.dim:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
  .btn-redraw.abi:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
  .btn-redraw.per:hover { border-color: var(--neon-green); color: var(--neon-green); }

  /* 底部问句 */
  .prompt-question {
    font-size: 18px;
    color: var(--text-secondary);
    margin-top: 20px;
    line-height: 1.6;
  }

  /* 抽三张按钮 */
  .btn-row {
    display: flex;
    justify-content: flex-start;
    margin-top: 28px;
  }

  .btn-draw-all {
    padding: 14px 32px;
    border-radius: 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: rgba(232, 61, 143, 0.08);
    color: var(--neon-pink);
    border: 1px solid rgba(232, 61, 143, 0.2);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-draw-all:hover {
    background: rgba(232, 61, 143, 0.12);
    border-color: rgba(232, 61, 143, 0.3);
  }

  .footer {
    margin-top: 48px;
    text-align: left;
    font-size: 12px;
    color: var(--text-muted);
  }

  @keyframes line-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .prompt-line.shaking {
    animation: line-shake 0.4s ease-in-out;
  }

  @media (min-width: 768px) {
    .container {
      max-width: 720px;
    }
    
    h1 {
      font-size: 30px;
    }
    
    .prompt-area {
      padding: 36px 40px;
    }
    
    .prompt-prefix, .prompt-main, .prompt-suffix {
      font-size: 18px;
    }
  }

  @media (min-width: 1024px) {
    body {
      padding: 60px 40px;
    }
    
    .container {
      max-width: 760px;
    }
    
    h1 {
      font-size: 32px;
    }
    
    .prompt-area {
      padding: 40px 44px;
    }
    
    .footer {
      text-align: center;
    }
  }

  @media (max-width: 600px) {
    body { padding: 24px 12px; }
    
    .container { max-width: 100%; }
    
    .header-pill {
      font-size: 11px;
      padding: 5px 12px;
      margin-bottom: 12px;
    }
    
    h1 { 
      font-size: 22px; 
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    
    .prompt-area { 
      padding: 20px 16px;
      border-radius: 20px;
    }
    
    .prompt-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    
    /* 最后一行去掉边框 */
    .prompt-line:last-of-type {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .prompt-line-content {
      flex: 1;
      min-width: 0;
    }
    
    .prompt-line-top {
      display: inline;
    }
    
    .prompt-line-bottom {
      display: block;
      margin-top: 4px;
    }
    
    .prompt-line.active.dim, 
    .prompt-line.active.abi, 
    .prompt-line.active.per {
      margin: -8px -12px;
      padding: 8px 12px 16px;
      border-radius: 12px;
      border-bottom: none;
    }
    
    .prompt-prefix { 
      font-size: 17px;
      white-space: nowrap;
      font-weight: 500;
    }
    
    .prompt-main {
      font-size: 17px;
      font-weight: 600;
      white-space: normal;
      word-break: keep-all;
    }
    
    .prompt-suffix-short {
      font-size: 17px;
      white-space: nowrap;
    }
    
    .prompt-suffix { 
      font-size: 16px;
      white-space: normal;
      line-height: 1.5;
      color: var(--text-muted);
    }
    
    .btn-redraw { 
      flex-shrink: 0;
      width: 30px; 
      height: 30px; 
      font-size: 13px;
      margin-left: 0;
    }
    
    .prompt-question { 
      font-size: 15px;
      margin-top: 20px;
      line-height: 1.5;
    }
    
    .btn-row {
      margin-top: 24px;
    }
    
    .btn-draw-all {
      padding: 12px 24px;
      font-size: 14px;
      width: 100%;
      justify-content: center;
    }
    
    .footer {
      margin-top: 32px;
      font-size: 11px;
    }
    
    .signal-ring:nth-child(1) { width: 300px; height: 300px; }
    .signal-ring:nth-child(2) { width: 450px; height: 450px; }
    .signal-ring:nth-child(3) { width: 600px; height: 600px; }
  }

  /* 桌面端保持原有布局 */
  @media (min-width: 601px) {
    .prompt-line-top {
      display: contents; /* 让内容融入父容器 */
    }
    
    .prompt-line-bottom {
      display: contents; /* 让内容融入父容器 */
    }
    
    .prompt-line-button-wrapper {
      display: contents; /* 让按钮融入父容器 */
    }
    
    .prompt-suffix-short {
      display: none;
    }
    
    /* 桌面端维度行的特殊处理 */
    #lineDim .prompt-line-bottom {
      display: contents;
    }
    
    #lineDim .prompt-suffix-short {
      display: none;
    }
    
    /* 桌面端按钮保持flex布局 */
    .btn-redraw {
      position: static;
      margin-left: auto;
    }
  }

  @media (max-width: 380px) {
    body { padding: 16px 10px; }
    
    h1 { font-size: 20px; }
    
    .prompt-area { padding: 16px 12px; }
    
    .prompt-prefix, .prompt-main, .prompt-suffix {
      font-size: 14px;
    }
    
    .btn-redraw {
      width: 26px;
      height: 26px;
    }
    
    .prompt-question { font-size: 14px; }
    
    .btn-draw-all {
      padding: 10px 20px;
      font-size: 13px;
    }
    
    .signal-ring:nth-child(1) { width: 250px; height: 250px; }
    .signal-ring:nth-child(2) { width: 350px; height: 350px; }
    .signal-ring:nth-child(3) { width: 450px; height: 450px; }
  }

  /* 防止文本溢出 */
  @media (max-width: 360px) {
    .prompt-line {
      gap: 2px;
    }
    
    .prompt-suffix {
      font-size: 13px;
    }
  }
  
  /* 横屏手机适配 */
  @media (max-height: 500px) and (orientation: landscape) {
    body {
      padding: 16px 20px;
      align-items: flex-start;
    }
    
    .container {
      max-width: 90%;
    }
    
    .footer {
      margin-top: 20px;
    }
    
    .signal-rings {
      display: none;
    }
  }
</style>
</head>

// ====== 状态 ======
let currentDim = null;
let currentAbi = null;
let currentPer = null;
let drawnDimIndices = [];
let drawnAbiIndices = [];
let drawnPerIndices = [];

// ====== 辅助函数 ======
function randomFromDeck(deck, drawnHistory) {
  if (deck.length === 0) return null;
  if (drawnHistory.length >= deck.length) drawnHistory = [];
  const available = deck.map((_, i) => i).filter(i => !drawnHistory.includes(i));
  if (available.length === 0) return null;
  const idx = available[Math.floor(Math.random() * available.length)];
  drawnHistory.push(idx);
  return { item: deck[idx], index: idx };
}

function shakeLine(lineId) {
  const line = document.getElementById(lineId);
  line.classList.add('shaking');
  setTimeout(() => line.classList.remove('shaking'), 400);
}

// ====== 渲染 ======
function renderPersona() {
  const line = document.getElementById('linePer');
  const main = document.getElementById('mainPer');
  const suffixShort = document.getElementById('suffixPerShort');
  const suffix = document.getElementById('suffixPer');
  
  if (currentPer) {
    line.classList.add('active');
    main.textContent = `「${currentPer.main}」`;
    suffixShort.textContent = '一样，';
    suffix.textContent = currentPer.suffix;
  } else {
    line.classList.remove('active');
    main.textContent = '「人格」';
    suffixShort.textContent = '一样，';
    suffix.textContent = '';
  }
}

function renderAbility() {
  const line = document.getElementById('lineAbi');
  const main = document.getElementById('mainAbi');
  const suffixShort = document.getElementById('suffixAbiShort');
  const suffix = document.getElementById('suffixAbi');
  
  if (currentAbi) {
    line.classList.add('active');
    main.textContent = `「${currentAbi.main}」`;
    suffixShort.textContent = '的能力，';
    suffix.textContent = currentAbi.suffix;
  } else {
    line.classList.remove('active');
    main.textContent = '「能力」';
    suffixShort.textContent = '的能力，';
    suffix.textContent = '';
  }
}

function renderDimension() {
  const line = document.getElementById('lineDim');
  const main = document.getElementById('mainDim');
  const suffix = document.getElementById('suffixDim');
  
  if (currentDim) {
    line.classList.add('active');
    main.textContent = `「${currentDim.main}」`;
    suffix.textContent = `—— ${currentDim.suffix}`;
  } else {
    line.classList.remove('active');
    main.textContent = '「问题」';
    suffix.textContent = '—— ';
  }
}

// 检测屏幕尺寸并调整桌面端渲染
function checkScreenSizeAndRender() {
  const isDesktop = window.innerWidth >= 601;
  
  if (isDesktop) {
    // 桌面端：把短后缀和长后缀合并
    if (currentAbi) {
      document.getElementById('suffixAbiShort').textContent = '';
      document.getElementById('suffixAbi').textContent = `的能力，${currentAbi.suffix}`;
    }
    if (currentPer) {
      document.getElementById('suffixPerShort').textContent = '';
      document.getElementById('suffixPer').textContent = `一样，${currentPer.suffix}`;
    }
  } else {
    // 手机端：正常渲染
    renderAbility();
    renderPersona();
  }
}

// 窗口大小变化时重新渲染
window.addEventListener('resize', checkScreenSizeAndRender);

// ====== 动作 ======
function drawDimension() {
  if (dimensionDeck.length === 0) return;
  shakeLine('lineDim');
  setTimeout(() => {
    const result = randomFromDeck(dimensionDeck, drawnDimIndices);
    currentDim = result ? result.item : null;
    renderDimension();
    checkScreenSizeAndRender();
  }, 200);
}

function drawAbility() {
  if (abilityDeck.length === 0) return;
  shakeLine('lineAbi');
  setTimeout(() => {
    const result = randomFromDeck(abilityDeck, drawnAbiIndices);
    currentAbi = result ? result.item : null;
    renderAbility();
    checkScreenSizeAndRender();

function drawPersona() {
  if (personaDeck.length === 0) return;

    const result = randomFromDeck(personaDeck, drawnPerIndices);
    currentPer = result ? result.item : null;
    renderPersona();
    checkScreenSizeAndRender();
  }, 200);
}

function drawAll() {
  drawDimension();
  drawAbility();
  drawPersona();
}
